name: Backend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mental_health_chatbot/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: mental_health_chatbot/backend
        run: python manage.py migrate

      - name: Run checks
        working-directory: mental_health_chatbot/backend
        run: python manage.py check

      - name: Run tests
        working-directory: mental_health_chatbot/backend
        run: python manage.py test apps.users.tests apps.chat.tests apps.admin_panel.tests
